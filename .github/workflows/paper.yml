name: paper-bot

# Continuous operation without relying on GitHub's unreliable cron: each job
# runs ~5.8h and, when it ends (even on timeout), triggers the next job itself
# (self-chaining). The concurrency group serialises runs so two never overlap.
# A low-frequency cron is kept only as a last-resort recovery if the chain ever
# breaks. (Free unlimited minutes since the repo is public.)
on:
  schedule:
    - cron: "0 */6 * * *"     # backup recovery only
  workflow_dispatch:

concurrency:
  group: paper-bot
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run paper loop (~5.8h, push state each cycle)
        run: python -u paper.py --minutes 350 --autopush

      - name: Chain the next run (self-restart, even on failure/timeout)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run paper.yml -R ${{ github.repository }}

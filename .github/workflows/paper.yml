name: paper-bot

# Robust scheduling: a fresh job starts every hour and (because
# cancel-in-progress is true) replaces whatever is running — even if the
# previous job hung. Each job runs ~65 min, so there's overlap with the next
# hourly trigger and effectively continuous coverage with no gap, while any
# internal hang is automatically cleared within the hour.
on:
  schedule:
    - cron: "0 * * * *"     # every hour
  workflow_dispatch:

concurrency:
  group: paper-bot
  cancel-in-progress: true   # a new run replaces a stuck/old one (self-healing)

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run paper loop (~65 min, push state each cycle)
        run: python -u paper.py --minutes 65 --autopush
